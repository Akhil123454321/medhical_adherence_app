# =============================================================================
# Nginx site config for MedAdhere
# Replace YOUR_DOMAIN with your actual domain (e.g. medadhere.com)
#
# Deploy to: /etc/nginx/sites-available/medadhere
# Enable:    sudo ln -s /etc/nginx/sites-available/medadhere \
#                       /etc/nginx/sites-enabled/medadhere
# Test:      sudo nginx -t
# Reload:    sudo systemctl reload nginx
# =============================================================================

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name medadhere.org www.medadhere.org;

    # Let certbot handle ACME challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name medadhere.org www.medadhere.org;

    # SSL — managed by Certbot (filled in automatically after `certbot --nginx`)
    ssl_certificate     /etc/letsencrypt/live/medadhere.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medadhere.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Max upload size (for CSV cap-log uploads)
    client_max_body_size 20M;

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
